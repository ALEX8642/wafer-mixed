# baseline.yaml — shared config for all machines.
#
# Batch size guidance (same policy as wafer-defect-classifier):
#   4090 laptop  (24 GB VRAM): batch_size: 64
#   5090 desktop (32 GB VRAM): batch_size: 128  ← default
# Override at runtime: --batch-size 64

data_root: data/raw          # relative to repo root; anchored to REPO_ROOT at load time
output_dir: outputs          # checkpoints, logs, plots
split_path: data/splits.npz  # persisted train/val/test indices (committed)
batch_size: 128
num_workers: 4               # set to 0 on Windows if multiprocessing errors
seed: 42
input_size: 224              # square resize target for the 52×52 maps
device: auto                 # "auto" → cuda if available else cpu; or "cuda"/"cpu"/"mps"

# Split fractions — stratified by full 38-type combination
test_frac: 0.20              # 20 % test
val_frac: 0.125              # 12.5 % of the remaining pool ≈ 10 % of total

# Training (Phase 1) — mirrors wafer-defect-classifier's baseline
num_epochs: 30
lr: 0.001
weight_decay: 0.0001
patience: 7                  # early stop after 7 epochs without val macro-F1 gain

# Model — ported ResNet-18+CBAM, 8-logit multi-label head (BCE-with-logits)
arch: resnet18               # resnet18 | resnet50
pretrained: false            # ImageNet weights transfer weakly to wafer maps
cbam: true                   # CBAM after each ResNet stage (the ported architecture)
cbam_reduction: 16

# Transfer study (Phase 2): path to a backbone checkpoint; empty = from scratch
backbone_ckpt_path: ""
